<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蛐蛐语音 - 状态</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Tahoma, sans-serif;
            background: transparent;
            overflow: hidden;
            -webkit-app-region: drag;
            user-select: none;
        }

        .container {
            width: 320px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon {
            font-size: 18px;
        }

        .controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }

        .control-btn {
            width: 24px;
            height: 24px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .status-section {
            padding: 16px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
        }

        .status-card.active {
            background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
            border-left: 3px solid #667eea;
        }

        .status-card.recording {
            background: linear-gradient(135deg, #f0937115 0%, #eb474715 100%);
            border-left: 3px solid #eb4747;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .status-card.success {
            background: linear-gradient(135deg, #56cc7515 0%, #4caf5015 100%);
            border-left: 3px solid #4caf50;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .status-label {
            font-size: 11px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .status-text {
            font-size: 13px;
            color: #333;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-icon {
            font-size: 16px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            transition: width 0.3s ease;
            width: 0%;
        }

        .result-preview {
            background: white;
            border-radius: 6px;
            padding: 10px;
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            max-height: 60px;
            overflow-y: auto;
            line-height: 1.5;
            border: 1px solid #e0e0e0;
        }

        .result-preview::-webkit-scrollbar {
            width: 4px;
        }

        .result-preview::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 2px;
        }

        .mode-indicator {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }

        .mode-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .history-btn {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            -webkit-app-region: no-drag;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .history-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .history-btn:active {
            transform: translateY(0);
        }

        .recording-indicator {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: linear-gradient(135deg, #ff6b6b20 0%, #ee525220 100%);
            border-radius: 8px;
            margin-bottom: 12px;
        }

        .recording-indicator.active {
            display: flex;
        }

        .recording-dot {
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
            animation: recording-pulse 1s ease-in-out infinite;
        }

        @keyframes recording-pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }

        .recording-time {
            font-size: 14px;
            font-weight: 600;
            color: #ff6b6b;
            flex: 1;
            font-family: 'Courier New', monospace;
        }

        .hotkey-hint {
            font-size: 10px;
            color: #999;
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-top: 1px solid #e0e0e0;
        }

        .hotkey-hint kbd {
            background: white;
            border: 1px solid #ddd;
            border-radius: 3px;
            padding: 2px 6px;
            font-size: 10px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <span class="icon">🎙️</span>
                <span>蛐蛐语音</span>
                <span class="mode-indicator">
                    <span class="mode-dot"></span>
                    <span id="currentMode">转写模式</span>
                </span>
            </div>
            <div class="controls">
                <button class="control-btn" onclick="openSettings()" title="设置">⚙️</button>
                <button class="control-btn" onclick="hideWindow()" title="隐藏">−</button>
            </div>
        </div>

        <div class="status-section">
            <!-- Recording Indicator -->
            <div id="recordingIndicator" class="recording-indicator">
                <div class="recording-dot"></div>
                <div class="recording-time">00:00</div>
                <div style="font-size: 12px; color: #ff6b6b;">录音中...</div>
            </div>

            <!-- Main Status -->
            <div id="mainStatus" class="status-card">
                <div class="status-label">当前状态</div>
                <div class="status-text">
                    <span class="status-icon">✓</span>
                    <span id="statusText">就绪 - 按快捷键开始录音</span>
                </div>
            </div>

            <!-- Processing Status -->
            <div id="processingStatus" class="status-card" style="display: none;">
                <div class="status-label">处理进度</div>
                <div class="status-text">
                    <span class="status-icon">⏳</span>
                    <span id="processingText">识别中...</span>
                </div>
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>

            <!-- Result Preview -->
            <div id="resultContainer" style="display: none;">
                <div class="status-card success">
                    <div class="status-label">识别结果</div>
                    <div class="result-preview" id="resultPreview"></div>
                </div>
            </div>

            <!-- History Button -->
            <button class="history-btn" onclick="openHistory()">
                📜 查看历史记录
            </button>
        </div>

        <div class="hotkey-hint">
            <kbd id="recordHotkey">Ctrl+Shift+R</kbd> 录音 ·
            <kbd id="modeHotkey">Ctrl+Shift+M</kbd> 切换模式
        </div>
    </div>

    <script src="status-window.js"></script>
</body>
</html>
