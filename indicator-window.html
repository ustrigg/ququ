<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    cursor: pointer;
  }

  .stage {
    position: relative;
    width: 80px;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  /* 中心按钮 — 56x56 */
  .voice-btn {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    transition: background 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }

  .stage.recording .voice-btn {
    background: #c0392b;
    transform: scale(1.1);
    animation: recPulse 1.2s ease-in-out infinite;
  }

  .stage.processing .voice-btn { background: #ff9500; }
  .stage.done .voice-btn { background: #4cd964; }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(192, 57, 43, 0.2); }
    50%      { box-shadow: 0 0 0 14px rgba(192, 57, 43, 0.08); }
  }

  /* 麦克风 SVG —— 默认显示，录音时隐藏 */
  .mic-icon {
    width: 22px;
    height: 22px;
    color: #fafaf7;
    stroke-width: 1.8;
    transition: opacity 0.15s;
  }
  .stage.recording .mic-icon { opacity: 0; }

  /* 波形 Canvas —— 覆盖在按钮正中，录音时显示 */
  .wave-canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .stage.recording .wave-canvas { opacity: 1; }

  /* 底部计时器浮标 */
  .label {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Segoe UI', 'Consolas', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fafaf7;
    background: rgba(26, 26, 26, 0.92);
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .label.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="voice-btn" id="voiceBtn">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
      <canvas class="wave-canvas" id="waveCanvas" width="56" height="56"></canvas>
    </button>
    <div class="label" id="label"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Canvas 56x56 物理 = CSS 尺寸（简单模式，不用 DPR）
    const CX = 28, CY = 28;

    let timerInterval = null;
    let startTime = 0;
    let currentFreqData = new Uint8Array(64);
    let lastDataTime = 0;
    let recording = false;
    let dataFrameCount = 0;
    let debugLogTimer = 0;

    // 画 28 根放射线，从中心半径 8 到 22 —— 完全在按钮内部
    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      ctx.clearRect(0, 0, 56, 56);
      if (!recording) return;

      const BARS = 28;
      const INNER_R = 8;   // 从中心半径 8 开始
      const MAX_EXT = 14;  // 最大延伸 14px，最远半径 22
      const MIN_EXT = 1;   // 静音最小长度（贴着 INNER_R）

      ctx.lineWidth = 1.6;
      ctx.lineCap = 'round';

      // 数据新鲜度：>500ms 没收到新数据 = 异常
      const dataFresh = (Date.now() - lastDataTime) < 500;

      // 全局响度（所有频段平均），用于整体强度指示
      let totalAmp = 0;
      for (let i = 0; i < currentFreqData.length; i++) totalAmp += currentFreqData[i];
      const avgAmp = dataFresh ? (totalAmp / currentFreqData.length / 255) : 0;

      for (let i = 0; i < BARS; i++) {
        const angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
        const freqIdx = Math.floor((i / BARS) * currentFreqData.length);
        const amp = dataFresh ? (currentFreqData[freqIdx] / 255) : 0;
        const extLen = INNER_R + MIN_EXT + amp * MAX_EXT;

        const x1 = CX + Math.cos(angle) * INNER_R;
        const y1 = CY + Math.sin(angle) * INNER_R;
        const x2 = CX + Math.cos(angle) * extLen;
        const y2 = CY + Math.sin(angle) * extLen;

        // 数据新鲜时白色（随响度加强），异常时暗灰
        const alpha = 0.55 + amp * 0.45;
        ctx.strokeStyle = dataFresh
          ? `rgba(255, 255, 255, ${alpha})`
          : `rgba(180, 180, 180, 0.3)`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      // 中心小圆点 —— 响度越大越亮（额外的响度信号）
      ctx.fillStyle = dataFresh
        ? `rgba(255, 255, 255, ${0.6 + avgAmp * 0.4})`
        : 'rgba(150, 150, 150, 0.3)';
      ctx.beginPath();
      ctx.arc(CX, CY, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    drawWaveform();

    // 从主窗口接收实时频谱数据
    ipcRenderer.on('indicator-waveform-data', (event, data) => {
      currentFreqData = new Uint8Array(data);
      lastDataTime = Date.now();
      dataFrameCount++;
      // 每秒日志一次，诊断是否收到数据
      const now = Date.now();
      if (now - debugLogTimer >= 2000) {
        let max = 0;
        for (let i = 0; i < currentFreqData.length; i++) if (currentFreqData[i] > max) max = currentFreqData[i];
        console.log(`[Indicator] recv ${dataFrameCount} frames, max=${max}/255, recording=${recording}`);
        dataFrameCount = 0;
        debugLogTimer = now;
      }
    });

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    ipcRenderer.on('indicator-recording', () => {
      console.log('[Indicator] -> recording');
      stopTimer();
      recording = true;
      stage.className = 'stage recording';
      label.classList.remove('visible');
      currentFreqData = new Uint8Array(64);
      lastDataTime = Date.now();
      // 强制清 canvas，避免残留
      ctx.clearRect(0, 0, 56, 56);
    });

    ipcRenderer.on('indicator-processing', () => {
      console.log('[Indicator] -> processing');
      recording = false;
      stage.className = 'stage processing';
      startTime = Date.now();
      label.classList.add('visible');
      timerInterval = setInterval(() => {
        const s = ((Date.now() - startTime) / 1000).toFixed(1);
        label.textContent = s + 's';
      }, 100);
    });

    ipcRenderer.on('indicator-done', () => {
      console.log('[Indicator] -> done');
      stopTimer();
      recording = false;
      stage.className = 'stage done';
      label.textContent = '✓';
      label.classList.add('visible');
    });

    stage.addEventListener('click', () => {
      ipcRenderer.send('indicator-clicked');
    });
  </script>
</body>
</html>
