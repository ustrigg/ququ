<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    cursor: pointer;
  }

  .stage {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  /* 波形 Canvas — 占满整个窗口，波形可延伸到按钮外部 */
  .wave-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 140px;
    height: 140px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .stage.recording .wave-canvas { opacity: 1; }

  /* 中心按钮 56x56 */
  .voice-btn {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    transition: background 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    z-index: 2;
  }

  .stage.recording .voice-btn {
    background: #c0392b;
    transform: scale(1.1);
    animation: recPulse 1.2s ease-in-out infinite;
  }

  .stage.processing .voice-btn { background: #ff9500; }
  .stage.done .voice-btn { background: #4cd964; }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(192, 57, 43, 0.2); }
    50%      { box-shadow: 0 0 0 14px rgba(192, 57, 43, 0.08); }
  }

  /* 麦克风 SVG */
  .mic-icon {
    width: 22px;
    height: 22px;
    color: #fafaf7;
    stroke-width: 1.8;
    transition: opacity 0.15s;
    z-index: 3;
  }
  .stage.recording .mic-icon { opacity: 0.3; }

  /* 底部计时器浮标 */
  .label {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Segoe UI', 'Consolas', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fafaf7;
    background: rgba(26, 26, 26, 0.92);
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 4;
  }
  .label.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas class="wave-canvas" id="waveCanvas" width="140" height="140"></canvas>
    <button class="voice-btn" id="voiceBtn">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="label" id="label"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Canvas 140x140, 中心 (70,70)
    const CX = 70, CY = 70;
    // 按钮半径 ~30 (56/2 * 1.1 放大)
    const BTN_R = 30;

    let timerInterval = null;
    let startTime = 0;
    let currentFreqData = new Uint8Array(64);
    let lastDataTime = 0;
    let recording = false;
    let dataFrameCount = 0;
    let debugLogTimer = 0;

    // 画 36 根放射线，从中心向外延伸最远至 65px（突破按钮边界）
    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      ctx.clearRect(0, 0, 140, 140);
      if (!recording) return;

      const BARS = 36;
      const INNER_R = 6;   // 从中心半径 6 开始（在按钮内部）
      const QUIET_R = 14;  // 静音时的基线长度
      const MAX_R = 62;    // 最大外延半径（超出按钮边缘 30+ 像素）

      ctx.lineWidth = 2;
      ctx.lineCap = 'round';

      const dataFresh = (Date.now() - lastDataTime) < 500;

      // 全局平均响度 — 驱动中心点 + 整体强度
      let totalAmp = 0;
      for (let i = 0; i < currentFreqData.length; i++) totalAmp += currentFreqData[i];
      const avgAmp = dataFresh ? (totalAmp / currentFreqData.length / 255) : 0;

      for (let i = 0; i < BARS; i++) {
        const angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
        const freqIdx = Math.floor((i / BARS) * currentFreqData.length);
        const amp = dataFresh ? (currentFreqData[freqIdx] / 255) : 0;
        // 线段长度：静音时贴近按钮，响度越大延伸越远
        const extLen = QUIET_R + amp * (MAX_R - QUIET_R);

        const x1 = CX + Math.cos(angle) * INNER_R;
        const y1 = CY + Math.sin(angle) * INNER_R;
        const x2 = CX + Math.cos(angle) * extLen;
        const y2 = CY + Math.sin(angle) * extLen;

        // 颜色：内部（按钮上）白色半透，外部（透明背景上）随距离变亮
        // 用线性渐变让每根线段从内到外过渡
        const grad = ctx.createLinearGradient(x1, y1, x2, y2);
        if (dataFresh) {
          grad.addColorStop(0, `rgba(255, 255, 255, ${0.85})`);
          grad.addColorStop(0.5, `rgba(255, 255, 255, ${0.7 + amp * 0.3})`);
          grad.addColorStop(1, `rgba(255, 200, 180, ${0.2 + amp * 0.6})`);
        } else {
          grad.addColorStop(0, 'rgba(180, 180, 180, 0.4)');
          grad.addColorStop(1, 'rgba(180, 180, 180, 0.15)');
        }
        ctx.strokeStyle = grad;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      // 响度大时画一个光晕外圈（按钮外轮廓），让大声响时视觉更明显
      if (dataFresh && avgAmp > 0.1) {
        const glowR = BTN_R + 6 + avgAmp * 20;
        const glowGrad = ctx.createRadialGradient(CX, CY, BTN_R, CX, CY, glowR);
        glowGrad.addColorStop(0, `rgba(255, 80, 80, ${avgAmp * 0.4})`);
        glowGrad.addColorStop(1, 'rgba(255, 80, 80, 0)');
        ctx.fillStyle = glowGrad;
        ctx.beginPath();
        ctx.arc(CX, CY, glowR, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    drawWaveform();

    ipcRenderer.on('indicator-waveform-data', (event, data) => {
      currentFreqData = new Uint8Array(data);
      lastDataTime = Date.now();
      dataFrameCount++;
      const now = Date.now();
      if (now - debugLogTimer >= 2000) {
        let max = 0;
        for (let i = 0; i < currentFreqData.length; i++) if (currentFreqData[i] > max) max = currentFreqData[i];
        console.log(`[Indicator] recv ${dataFrameCount} frames, max=${max}/255, recording=${recording}`);
        dataFrameCount = 0;
        debugLogTimer = now;
      }
    });

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    ipcRenderer.on('indicator-recording', () => {
      console.log('[Indicator] -> recording');
      stopTimer();
      recording = true;
      stage.className = 'stage recording';
      label.classList.remove('visible');
      currentFreqData = new Uint8Array(64);
      lastDataTime = Date.now();
      ctx.clearRect(0, 0, 140, 140);
    });

    ipcRenderer.on('indicator-processing', () => {
      console.log('[Indicator] -> processing');
      recording = false;
      stage.className = 'stage processing';
      startTime = Date.now();
      label.classList.add('visible');
      timerInterval = setInterval(() => {
        const s = ((Date.now() - startTime) / 1000).toFixed(1);
        label.textContent = s + 's';
      }, 100);
    });

    ipcRenderer.on('indicator-done', () => {
      console.log('[Indicator] -> done');
      stopTimer();
      recording = false;
      stage.className = 'stage done';
      label.textContent = '✓';
      label.classList.add('visible');
    });

    stage.addEventListener('click', () => {
      ipcRenderer.send('indicator-clicked');
    });
  </script>
</body>
</html>
