<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    cursor: pointer;
  }

  .stage {
    position: relative;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  /* 波形 Canvas — 最底层，覆盖整个 stage */
  .wave-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 140px;
    height: 140px;
    pointer-events: none;
    z-index: 1;
  }

  /* 呼吸扩散光环（空闲时的背景效果） */
  .ring {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
    border-radius: 50%;
    border: 2px solid #1a1a1a;
    opacity: 0;
    animation: breathe 3s ease-out infinite;
    z-index: 2;
  }

  .ring-2 { animation-delay: 1.5s; }

  .stage.recording .ring {
    border-color: #c0392b;
    animation-duration: 0.9s;
  }

  @keyframes breathe {
    0% { transform: scale(1); opacity: 0.4; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  /* 中心按钮 */
  .voice-btn {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    z-index: 3;
    transition: all 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
  }

  .stage.recording .voice-btn {
    background: #c0392b;
    transform: scale(1.1);
    animation: recPulse 1.2s ease-in-out infinite;
  }

  .stage.processing .voice-btn {
    background: #ff9500;
  }

  .stage.done .voice-btn {
    background: #4cd964;
  }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(192, 57, 43, 0.2); }
    50%      { box-shadow: 0 0 0 14px rgba(192, 57, 43, 0.08); }
  }

  /* 麦克风图标 */
  .mic-icon {
    width: 24px;
    height: 24px;
    color: #fafaf7;
    stroke-width: 2;
  }

  /* 计时器/状态标签 */
  .label {
    position: absolute;
    bottom: 4px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Segoe UI', 'Consolas', monospace;
    font-size: 11px;
    font-weight: 700;
    color: #fafaf7;
    background: rgba(26, 26, 26, 0.92);
    padding: 3px 10px;
    border-radius: 10px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    z-index: 6;
  }

  .label.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <canvas class="wave-canvas" id="waveCanvas"></canvas>
    <span class="ring ring-1"></span>
    <span class="ring ring-2"></span>
    <button class="voice-btn" id="voiceBtn">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div class="label" id="label"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Canvas 使用 DPR 保证高清
    const W = 140, H = 140, CX = W / 2, CY = H / 2;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    ctx.scale(dpr, dpr);

    let timerInterval = null;
    let startTime = 0;
    let currentFreqData = new Uint8Array(64);
    let lastDataTime = 0;
    let recording = false;

    // 画 32 根放射状波形线（环绕按钮外部）
    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      ctx.clearRect(0, 0, W, H);

      if (!recording) return;

      const BARS = 32;
      const INNER_R = 36;  // 按钮半径 28 + 8 间距，从按钮外部开始画
      const MAX_EXT = 24;  // 最大延伸长度
      const MIN_EXT = 4;   // 静音时的最小长度（让线条始终可见）

      ctx.lineWidth = 2.2;
      ctx.lineCap = 'round';

      // 数据新鲜度检查 — 超过 500ms 没新数据认为掉线
      const dataFresh = (Date.now() - lastDataTime) < 500;

      for (let i = 0; i < BARS; i++) {
        const angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
        const freqIdx = Math.floor((i / BARS) * currentFreqData.length);
        const amp = dataFresh ? currentFreqData[freqIdx] / 255 : 0;
        const extLen = INNER_R + MIN_EXT + amp * MAX_EXT;

        const x1 = CX + Math.cos(angle) * INNER_R;
        const y1 = CY + Math.sin(angle) * INNER_R;
        const x2 = CX + Math.cos(angle) * extLen;
        const y2 = CY + Math.sin(angle) * extLen;

        // 颜色：数据新鲜时白色，否则暗灰（提示数据异常）
        const alpha = 0.5 + amp * 0.5;
        ctx.strokeStyle = dataFresh
          ? `rgba(255, 255, 255, ${alpha})`
          : `rgba(120, 120, 120, 0.4)`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }
    }
    drawWaveform();

    // 从主窗口接收频谱数据
    ipcRenderer.on('indicator-waveform-data', (event, data) => {
      currentFreqData = new Uint8Array(data);
      lastDataTime = Date.now();
    });

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    ipcRenderer.on('indicator-recording', () => {
      stopTimer();
      recording = true;
      stage.className = 'stage recording';
      label.classList.remove('visible');
      currentFreqData = new Uint8Array(64);
      lastDataTime = Date.now();
    });

    ipcRenderer.on('indicator-processing', () => {
      recording = false;
      stage.className = 'stage processing';
      startTime = Date.now();
      label.classList.add('visible');
      timerInterval = setInterval(() => {
        const s = ((Date.now() - startTime) / 1000).toFixed(1);
        label.textContent = s + 's';
      }, 100);
    });

    ipcRenderer.on('indicator-done', () => {
      stopTimer();
      recording = false;
      stage.className = 'stage done';
      label.textContent = '✓';
      label.classList.add('visible');
    });

    stage.addEventListener('click', () => {
      ipcRenderer.send('indicator-clicked');
    });
  </script>
</body>
</html>
