<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag;
    cursor: pointer;
  }

  .stage {
    position: relative;
    width: 120px;
    height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-app-region: no-drag;
  }

  /* 中心按钮 56x56 */
  .voice-btn {
    position: relative;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    border: none;
    transition: background 0.3s ease, transform 0.3s ease;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    z-index: 1;
  }

  .stage.recording .voice-btn {
    background: #c0392b;
    transform: scale(1.1);
    animation: recPulse 1.2s ease-in-out infinite;
  }

  .stage.processing .voice-btn { background: #ff9500; }
  .stage.done .voice-btn { background: #4cd964; }

  @keyframes recPulse {
    0%, 100% { box-shadow: 0 0 0 6px rgba(192, 57, 43, 0.2); }
    50%      { box-shadow: 0 0 0 14px rgba(192, 57, 43, 0.08); }
  }

  /* 麦克风 SVG — 2 层级（在按钮上方） */
  .mic-icon {
    width: 22px;
    height: 22px;
    color: #fafaf7;
    stroke-width: 1.8;
    transition: opacity 0.15s;
    z-index: 2;
  }
  .stage.recording .mic-icon { opacity: 0; }

  /* 波形 Canvas — 置顶（z-index 最高），盖在按钮和 mic-icon 之上 */
  /* 使用 will-change 和 translate3d 强制提升到独立合成层，避免被按钮的 transform 合成层遮挡 */
  .wave-canvas {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 56px;
    height: 56px;
    margin: -28px 0 0 -28px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 999;
    will-change: transform;
    transform: translate3d(0, 0, 0);
  }
  .stage.recording .wave-canvas { opacity: 1; }
  /* 录音时按钮放大了，canvas 也对应放大以匹配 */
  .stage.recording .wave-canvas {
    transform: translate3d(0, 0, 0) scale(1.1);
    opacity: 1;
  }

  /* 底部计时器浮标 */
  .label {
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Segoe UI', 'Consolas', monospace;
    font-size: 10px;
    font-weight: 700;
    color: #fafaf7;
    background: rgba(26, 26, 26, 0.92);
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 20;
  }
  .label.visible { opacity: 1; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="voice-btn" id="voiceBtn">
      <svg class="mic-icon" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <canvas class="wave-canvas" id="waveCanvas" width="56" height="56"></canvas>
    <div class="label" id="label"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');
    const stage = document.getElementById('stage');
    const label = document.getElementById('label');
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');

    // Canvas 56x56，中心 (28,28)，按钮半径约 28
    const CX = 28, CY = 28;

    let timerInterval = null;
    let startTime = 0;
    let currentFreqData = new Uint8Array(64);
    let lastDataTime = 0;
    let recording = false;
    let dataFrameCount = 0;
    let debugLogTimer = 0;
    // 动态归一化
    let recentPeak = 50;
    let smoothedBars = new Float32Array(28);

    // 画 28 根放射线，从中心向外，最远到按钮边缘内侧（半径 26）
    function drawWaveform() {
      requestAnimationFrame(drawWaveform);
      ctx.clearRect(0, 0, 56, 56);
      if (!recording) return;

      const BARS = 28;
      const INNER_R = 3;   // 从中心半径 3 开始（极近中心）
      const QUIET_R = 6;   // 静音时的基线长度
      const MAX_R = 26;    // 最大长度（按钮半径 28，留 2px 边距）

      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';

      const dataFresh = (Date.now() - lastDataTime) < 500;

      // 当前帧峰值 + 平均响度
      let frameMax = 0;
      let totalAmp = 0;
      for (let i = 0; i < currentFreqData.length; i++) {
        if (currentFreqData[i] > frameMax) frameMax = currentFreqData[i];
        totalAmp += currentFreqData[i];
      }
      const avgAmp = dataFresh ? (totalAmp / currentFreqData.length / 255) : 0;

      // 动态归一化
      if (dataFresh) {
        recentPeak = Math.max(recentPeak * 0.995, frameMax, 30);
      }
      const normalize = recentPeak > 10 ? (255 / recentPeak) : 1;

      for (let i = 0; i < BARS; i++) {
        const angle = (i / BARS) * Math.PI * 2 - Math.PI / 2;
        const freqIdx = Math.floor((i / BARS) * currentFreqData.length);
        const rawAmp = dataFresh ? (currentFreqData[freqIdx] / 255) : 0;

        const normAmp = Math.min(1, rawAmp * normalize);
        const mapped = Math.sqrt(normAmp);  // 非线性放大

        const targetLen = QUIET_R + mapped * (MAX_R - QUIET_R);
        const prev = smoothedBars[i] || QUIET_R;
        const alpha = targetLen > prev ? 0.6 : 0.15;
        smoothedBars[i] = prev + (targetLen - prev) * alpha;

        const extLen = smoothedBars[i];
        const x1 = CX + Math.cos(angle) * INNER_R;
        const y1 = CY + Math.sin(angle) * INNER_R;
        const x2 = CX + Math.cos(angle) * extLen;
        const y2 = CY + Math.sin(angle) * extLen;

        // 纯白色线条，在红色按钮上高对比度
        const alpha2 = dataFresh ? (0.7 + mapped * 0.3) : 0.3;
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha2})`;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();
      }

      // 中心亮点（总响度指示）
      const centerR = 1.5 + avgAmp * 2;
      ctx.fillStyle = dataFresh
        ? `rgba(255, 255, 255, ${0.8 + avgAmp * 0.2})`
        : 'rgba(180, 180, 180, 0.4)';
      ctx.beginPath();
      ctx.arc(CX, CY, centerR, 0, Math.PI * 2);
      ctx.fill();
    }
    drawWaveform();

    ipcRenderer.on('indicator-waveform-data', (event, data) => {
      currentFreqData = new Uint8Array(data);
      lastDataTime = Date.now();
      dataFrameCount++;
      const now = Date.now();
      if (now - debugLogTimer >= 2000) {
        let max = 0;
        for (let i = 0; i < currentFreqData.length; i++) if (currentFreqData[i] > max) max = currentFreqData[i];
        console.log(`[Indicator] recv ${dataFrameCount} frames, max=${max}/255, peak=${recentPeak.toFixed(0)}, recording=${recording}`);
        dataFrameCount = 0;
        debugLogTimer = now;
      }
    });

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    ipcRenderer.on('indicator-recording', () => {
      console.log('[Indicator] -> recording');
      stopTimer();
      recording = true;
      stage.className = 'stage recording';
      label.classList.remove('visible');
      currentFreqData = new Uint8Array(64);
      lastDataTime = Date.now();
      smoothedBars = new Float32Array(28);
      recentPeak = 50;
      ctx.clearRect(0, 0, 56, 56);
    });

    ipcRenderer.on('indicator-processing', () => {
      console.log('[Indicator] -> processing');
      recording = false;
      stage.className = 'stage processing';
      startTime = Date.now();
      label.classList.add('visible');
      timerInterval = setInterval(() => {
        const s = ((Date.now() - startTime) / 1000).toFixed(1);
        label.textContent = s + 's';
      }, 100);
    });

    ipcRenderer.on('indicator-done', () => {
      console.log('[Indicator] -> done');
      stopTimer();
      recording = false;
      stage.className = 'stage done';
      label.textContent = '✓';
      label.classList.add('visible');
    });

    stage.addEventListener('click', () => {
      ipcRenderer.send('indicator-clicked');
    });
  </script>
</body>
</html>
