<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1a1a;
    border-radius: 16px;
    -webkit-app-region: drag;
    cursor: pointer;
  }
  .box {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 0 20px;
    -webkit-app-region: no-drag;
  }

  /* Red pulsing dot */
  .dot {
    width: 24px;
    height: 24px;
    min-width: 24px;
    border-radius: 50%;
    background: #ff3b30;
    box-shadow: 0 0 8px rgba(255, 59, 48, 0.8);
    animation: pulse 1s ease-in-out infinite;
  }
  .dot.orange {
    background: #ff9500;
    box-shadow: 0 0 8px rgba(255, 149, 0, 0.8);
    animation: none;
  }
  .dot.green {
    background: #4cd964;
    box-shadow: 0 0 8px rgba(76, 217, 100, 0.8);
    animation: none;
  }

  .label {
    font-family: 'Segoe UI', 'Consolas', monospace;
    font-size: 20px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
</style>
</head>
<body>
  <div class="box" id="box">
    <div class="dot" id="dot"></div>
    <span class="label" id="label">REC</span>
  </div>
  <script>
    const { ipcRenderer } = require('electron');
    const dot = document.getElementById('dot');
    const label = document.getElementById('label');
    let timerInterval = null;
    let startTime = 0;

    function stopTimer() {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    ipcRenderer.on('indicator-recording', () => {
      stopTimer();
      dot.className = 'dot';
      label.textContent = 'REC';
    });

    ipcRenderer.on('indicator-processing', () => {
      dot.className = 'dot orange';
      startTime = Date.now();
      timerInterval = setInterval(() => {
        const s = ((Date.now() - startTime) / 1000).toFixed(1);
        label.textContent = s + 's';
      }, 100);
    });

    ipcRenderer.on('indicator-done', () => {
      stopTimer();
      dot.className = 'dot green';
      label.textContent = 'OK';
    });

    document.getElementById('box').addEventListener('click', () => {
      ipcRenderer.send('indicator-clicked');
    });
  </script>
</body>
</html>
